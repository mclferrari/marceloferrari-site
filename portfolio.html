  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

  <!-- Mobile menu toggle -->
  <script>
    const menuBtn = document.getElementById("menuBtn");
    const nav = document.getElementById("siteNav");
    if(menuBtn && nav){
      menuBtn.addEventListener("click", ()=>{
        const open = nav.classList.toggle("open");
        menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
      });

      document.addEventListener("click", (e)=>{
        if(!nav.classList.contains("open")) return;
        const clickedInside = nav.contains(e.target) || menuBtn.contains(e.target);
        if(!clickedInside){
          nav.classList.remove("open");
          menuBtn.setAttribute("aria-expanded","false");
        }
      });
    }
  </script>

  <!-- Lightbox (fade + ESC) -->
  <script>
    document.querySelectorAll(".gallery a").forEach(link=>{
      link.addEventListener("click",function(e){
        e.preventDefault();

        const overlay=document.createElement("div");
        overlay.style.position="fixed";
        overlay.style.inset="0";
        overlay.style.background="rgba(0,0,0,.92)";
        overlay.style.display="flex";
        overlay.style.alignItems="center";
        overlay.style.justifyContent="center";
        overlay.style.zIndex="9999";
        overlay.style.opacity="0";
        overlay.style.transition="opacity .25s ease";

        const img=document.createElement("img");
        img.src=this.href;
        img.style.maxWidth="92%";
        img.style.maxHeight="92%";
        img.style.borderRadius="10px";
        img.style.boxShadow="0 20px 50px rgba(0,0,0,.7)";

        overlay.appendChild(img);
        document.body.appendChild(overlay);
        setTimeout(()=>overlay.style.opacity="1",10);

        overlay.addEventListener("click",()=>overlay.remove());

        document.addEventListener("keydown",function esc(ev){
          if(ev.key==="Escape"){
            overlay.remove();
            document.removeEventListener("keydown",esc);
          }
        });
      });
    });
  </script>

  <!-- Scroll reveal -->
  <script>
    const revealEls = document.querySelectorAll(".section, .hero, .site-footer");
    revealEls.forEach(el => el.classList.add("reveal"));

    const io = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add("in-view");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    revealEls.forEach(el => io.observe(el));
  </script>
  <button class="back-to-top" aria-label="Back to top">↑</button>

  <script>
    const btn = document.querySelector('.back-to-top');
    const toggleBtn = () => btn.classList.toggle('show', window.scrollY > 500);
    window.addEventListener('scroll', toggleBtn);
    toggleBtn();
  
    btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
